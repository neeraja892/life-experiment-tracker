<!DOCTYPE html>
<html>
<head>
  <title>Life Experiment Tracker</title>
  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #f4f4f4;
    }
    input, textarea {
      width: 100%;
      margin: 5px 0;
      padding: 8px;
    }
    button {
      padding: 10px;
      background: blue;
      color: white;
      border: none;
      margin-top: 10px;
    }
    .card {
      background: white;
      padding: 10px;
      margin-top: 10px;
      border-radius: 10px;
    }
  </style>
</head>
<body>

<h2>🧪 Life Experiment Tracker</h2>

<input id="title" placeholder="Experiment name">
<textarea id="notes" placeholder="Notes"></textarea>

<label>Mood (1-10)</label>
<input type="number" id="mood" min="1" max="10">

<label>Productivity (1-10)</label>
<input type="number" id="productivity" min="1" max="10">

<label>Focus (1-10)</label>
<input type="number" id="focus" min="1" max="10">

<button onclick="addExperiment()">Add Experiment</button>

<div id="list"></div>

<script>
let experiments = JSON.parse(localStorage.getItem("experiments")) || [];

function addExperiment() {
  let exp = {
    title: document.getElementById("title").value,
    notes: document.getElementById("notes").value,
    mood: document.getElementById("mood").value,
    productivity: document.getElementById("productivity").value,
    focus: document.getElementById("focus").value
  };

  experiments.push(exp);
  localStorage.setItem("experiments", JSON.stringify(experiments));
  display();
}

function display() {
  let list = document.getElementById("list");
  list.innerHTML = "";

  experiments.forEach((e, i) => {
    list.innerHTML += `
      <div class="card">
        <h3>${e.title}</h3>
        <p>${e.notes}</p>
        <p>😊 Mood: ${e.mood}</p>
        <p>⚡ Productivity: ${e.productivity}</p>
        <p>🎯 Focus: ${e.focus}</p>
        <button onclick="deleteExp(${i})">Delete</button>
      </div>
    `;
  });
}

function deleteExp(i) {
  experiments.splice(i, 1);
  localStorage.setItem("experiments", JSON.stringify(experiments));
  display();
}

display();
</script>

</body>
</html>
